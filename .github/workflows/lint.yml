name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml parses
        run: python3 -c "import yaml; yaml.safe_load(open('action.yml'))"

      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
